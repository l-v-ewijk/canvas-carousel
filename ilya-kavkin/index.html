<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Carousel</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
    rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000; /* optional */
  }
  .carousel-item img {
    width: 100%;
    height: 500px;        /* or any height you prefer */
    object-fit: contain;  /* show full image */
    background: #000;     /* fills empty space */
  }
</style>
</head>

<body>

  <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">

    <!-- Indicators (dots) -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
      <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="3"></button>
    </div>

    <!-- Slides -->
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://raw.githubusercontent.com/l-v-ewijk/canvas-carousel/refs/heads/main/ilya-kavkin/Picture1.jpg" alt="Slide 1">
      </div>
      <div class="carousel-item">
        <img src="https://raw.githubusercontent.com/l-v-ewijk/canvas-carousel/refs/heads/main/ilya-kavkin/Picture2.jpg" alt="Slide 2">
      </div>
      <div class="carousel-item">
        <img src="https://raw.githubusercontent.com/l-v-ewijk/canvas-carousel/refs/heads/main/ilya-kavkin/Picture3.jpg" alt="Slide 3">
      </div>
       <div class="carousel-item">
        <img src="https://raw.githubusercontent.com/l-v-ewijk/canvas-carousel/refs/heads/main/ilya-kavkin/Picture4.jpg" alt="Slide 3">
      </div>
    </div>

    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
